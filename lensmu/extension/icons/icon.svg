<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background: rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="#4A90D9" />

  <!-- Speech bubble shape -->
  <path d="M24 28 h72 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-40 l-16 16 v-16 h-16 a12 12 0 0 1 -12 -12 v-40 a12 12 0 0 1 12 -12 z"
        fill="white" opacity="0.95" />

  <!-- Letter "A" on the left side (Latin) -->
  <text x="42" y="76" font-family="Arial, Helvetica, sans-serif" font-size="38"
        font-weight="bold" fill="#4A90D9" text-anchor="middle">A</text>

  <!-- CJK character on the right side (Japanese/Chinese for "writing/text") -->
  <text x="86" y="76" font-family="Arial, Helvetica, sans-serif" font-size="34"
        font-weight="bold" fill="#E85D3A" text-anchor="middle">&#25991;</text>

  <!-- Small arrows between the letters indicating translation -->
  <line x1="56" y1="54" x2="70" y2="54" stroke="#666" stroke-width="2.5" stroke-linecap="round" />
  <polyline points="67,50 71,54 67,58" fill="none" stroke="#666" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" />
  <line x1="70" y1="66" x2="56" y2="66" stroke="#666" stroke-width="2.5" stroke-linecap="round" />
  <polyline points="59,62 55,66 59,70" fill="none" stroke="#666" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" />
</svg>
